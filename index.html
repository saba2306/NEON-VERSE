<!DOCTYPE html>
<html>
<head>
  <title>NeonVerse Watch Intelligence</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>🎬 NeonVerse Watch Intelligence</h1>

  <nav>
    <button onclick="load('movies')">Movies</button>
    <button onclick="load('series')">Series</button>
    <button onclick="load('books')">Books</button>
    <button onclick="load('music')">Music</button>
    <button onclick="load('fitness')">Fitness</button>
  </nav>

  <select onchange="setMood(this.value)">
    <option value="">🎭 Mood AI</option>
    <option value="happy">Happy</option>
    <option value="sad">Sad</option>
    <option value="motivated">Motivated</option>
    <option value="relax">Relax</option>
    <option value="energetic">Energetic</option>
  </select>
</header>

<div id="content" class="grid"></div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">

    <iframe id="player" width="100%" height="300"></iframe>

    <h3>📺 Watch Options</h3>
    <div id="watch"></div>

    <h3>🧠 AI Insight</h3>
    <div id="ai"></div>

  </div>
</div>

<script src="app.js"></script>
</body>
</html>
